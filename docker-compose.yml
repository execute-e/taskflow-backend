services:
  #* DATABASE (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: tf_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - taskflow_app

  #* Cache (Redis)
  redis:
    image: redis:alpine
    container_name: tf_redis
    restart: always
    environment:
      - REDIS_PORT=${REDIS_PORT}
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    networks:
      - taskflow_app
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}

  #* Backend (Nest.js)
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: tf_backend
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      NODE_ENV: ${NODE_ENV}
    ports:
      - "${PORT}:${PORT}"
    networks:
      - taskflow_app

  #* Telegram bot (Grammy)
  # tg-bot:
  #  build:
  #    context: .
  #    dockerfile: apps/tg-bot/Dockerfile
  #  container_name: tf_bot
  #  restart: always
  #  depends_on:
  #    - backend
  #  environment:
  #    BOT_TOKEN: ${BOT_TOKEN}
  #    API_URL: "http://backend:${PORT}"

volumes:
  pgdata:
  redis_data:

networks:
  taskflow_app:
